<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bathtub - rectangular outer shell with rounded inner basin, faucet at one end (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer rim -->
    <rect x="10" y="22" width="80" height="56" rx="10" fill="currentColor" fill-opacity="0.04"/>
    <!-- Inner basin -->
    <rect x="22" y="30" width="60" height="40" rx="14"/>
    <!-- Drain -->
    <circle cx="74" cy="50" r="3"/>
    <!-- Faucet + handles -->
    <line x1="15" y1="42" x2="15" y2="58" stroke-width="2.4"/>
    <circle cx="15" cy="42" r="2"/>
    <circle cx="15" cy="58" r="2"/>
    <line x1="17" y1="50" x2="22" y2="50" opacity="0.7"/>
  </g>
</svg>