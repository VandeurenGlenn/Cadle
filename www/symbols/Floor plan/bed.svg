<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bed - headboard, mattress, two pillows and turned-back duvet (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Headboard -->
    <rect x="10" y="12" width="80" height="8" rx="2" fill="currentColor" fill-opacity="0.12"/>
    <!-- Mattress -->
    <rect x="12" y="22" width="76" height="66" rx="4" fill="currentColor" fill-opacity="0.04"/>
    <!-- Pillows -->
    <rect x="16" y="26" width="32" height="14" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <rect x="52" y="26" width="32" height="14" rx="3" fill="currentColor" fill-opacity="0.1"/>
    <!-- Duvet fold -->
    <line x1="12" y1="50" x2="88" y2="50" opacity="0.45"/>
  </g>
</svg>