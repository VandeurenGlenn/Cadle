<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bookshelf - frame with horizontal shelves and book spines -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="12" y="14" width="76" height="72" rx="3" fill="currentColor" fill-opacity="0.05"/>
    <!-- Shelves -->
    <line x1="12" y1="32" x2="88" y2="32"/>
    <line x1="12" y1="50" x2="88" y2="50"/>
    <line x1="12" y1="68" x2="88" y2="68"/>
    <!-- Books on shelf 1 -->
    <rect x="18" y="18" width="4" height="12" fill="currentColor" fill-opacity="0.3"/>
    <rect x="24" y="20" width="4" height="10" fill="currentColor" fill-opacity="0.5"/>
    <rect x="30" y="17" width="5" height="13" fill="currentColor" fill-opacity="0.2"/>
    <rect x="55" y="19" width="4" height="11" fill="currentColor" fill-opacity="0.4"/>
    <rect x="61" y="18" width="5" height="12" fill="currentColor" fill-opacity="0.25"/>
    <!-- Books on shelf 2 -->
    <rect x="18" y="36" width="5" height="12" fill="currentColor" fill-opacity="0.35"/>
    <rect x="25" y="38" width="4" height="10" fill="currentColor" fill-opacity="0.2"/>
    <rect x="68" y="36" width="5" height="12" fill="currentColor" fill-opacity="0.4"/>
    <rect x="75" y="37" width="4" height="11" fill="currentColor" fill-opacity="0.25"/>
    <!-- Books on shelf 3 -->
    <rect x="40" y="54" width="5" height="12" fill="currentColor" fill-opacity="0.3"/>
    <rect x="47" y="56" width="4" height="10" fill="currentColor" fill-opacity="0.45"/>
    <rect x="53" y="55" width="5" height="11" fill="currentColor" fill-opacity="0.2"/>
  </g>
</svg>