<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Counter - kitchen worktop with cabinet divisions (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Worktop -->
    <rect x="6" y="32" width="88" height="36" rx="3" fill="currentColor" fill-opacity="0.06"/>
    <!-- Wall edge hint -->
    <line x1="6" y1="36" x2="94" y2="36" opacity="0.4"/>
    <!-- Cabinet division lines -->
    <line x1="30" y1="32" x2="30" y2="68" opacity="0.4"/>
    <line x1="50" y1="32" x2="50" y2="68" opacity="0.4"/>
    <line x1="70" y1="32" x2="70" y2="68" opacity="0.4"/>
    <!-- Front edge -->
    <line x1="6" y1="64" x2="94" y2="64" opacity="0.4"/>
  </g>
</svg>