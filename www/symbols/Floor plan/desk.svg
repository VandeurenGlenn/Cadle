<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Desk - work surface with drawer pedestal, monitor and chair (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Surface -->
    <rect x="10" y="22" width="80" height="40" rx="3" fill="currentColor" fill-opacity="0.05"/>
    <!-- Drawer pedestal -->
    <rect x="10" y="22" width="22" height="40" rx="2" fill="currentColor" fill-opacity="0.1"/>
    <line x1="10" y1="35" x2="32" y2="35" opacity="0.5"/>
    <line x1="10" y1="48" x2="32" y2="48" opacity="0.5"/>
    <!-- Monitor -->
    <rect x="50" y="26" width="30" height="6" rx="1" fill="currentColor" fill-opacity="0.2"/>
    <!-- Chair -->
    <rect x="38" y="68" width="24" height="18" rx="4" opacity="0.7"/>
  </g>
</svg>