<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shower - tray with showerhead, glass screen and central drain (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tray -->
    <rect x="15" y="15" width="70" height="70" rx="4" fill="currentColor" fill-opacity="0.04"/>
    <!-- Tile grooves -->
    <line x1="15" y1="50" x2="85" y2="50" opacity="0.25"/>
    <line x1="50" y1="15" x2="50" y2="85" opacity="0.25"/>
    <!-- Glass screen along one wall -->
    <line x1="15" y1="18" x2="85" y2="18" stroke-width="2.4"/>
    <!-- Showerhead -->
    <circle cx="22" cy="22" r="4" fill="currentColor" fill-opacity="0.18"/>
    <line x1="22" y1="22" x2="22" y2="15" opacity="0.6"/>
    <!-- Central drain -->
    <circle cx="50" cy="50" r="6"/>
    <line x1="45" y1="50" x2="55" y2="50" opacity="0.6"/>
    <line x1="50" y1="45" x2="50" y2="55" opacity="0.6"/>
  </g>
</svg>