<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sink - countertop with basin, faucet and mixer handles (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Counter -->
    <rect x="10" y="18" width="80" height="64" rx="3" fill="currentColor" fill-opacity="0.04"/>
    <!-- Basin -->
    <rect x="22" y="34" width="56" height="38" rx="5"/>
    <!-- Drain -->
    <circle cx="50" cy="53" r="3.5"/>
    <line x1="47" y1="53" x2="53" y2="53" opacity="0.6"/>
    <!-- Faucet body -->
    <rect x="46" y="20" width="8" height="8" rx="1.5" fill="currentColor" fill-opacity="0.18"/>
    <line x1="50" y1="28" x2="50" y2="34"/>
    <!-- Mixer handles -->
    <circle cx="40" cy="24" r="2.5"/>
    <circle cx="60" cy="24" r="2.5"/>
  </g>
</svg>