<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dining table - wood top with grain hint and 4 chairs (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top -->
    <rect x="16" y="28" width="68" height="44" rx="4" fill="currentColor" fill-opacity="0.06"/>
    <line x1="16" y1="50" x2="84" y2="50" opacity="0.3"/>
    <!-- Chairs -->
    <rect x="20" y="12" width="20" height="12" rx="2" opacity="0.7"/>
    <rect x="60" y="12" width="20" height="12" rx="2" opacity="0.7"/>
    <rect x="20" y="76" width="20" height="12" rx="2" opacity="0.7"/>
    <rect x="60" y="76" width="20" height="12" rx="2" opacity="0.7"/>
  </g>
</svg>