<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wardrobe - cabinet with hanging rail and double doors (top-down) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cabinet -->
    <rect x="12" y="24" width="76" height="52" rx="3" fill="currentColor" fill-opacity="0.05"/>
    <!-- Door split -->
    <line x1="50" y1="24" x2="50" y2="76"/>
    <!-- Inner panel -->
    <rect x="16" y="28" width="68" height="44" rx="2" opacity="0.5"/>
    <!-- Hanging rail -->
    <line x1="20" y1="50" x2="80" y2="50" stroke-dasharray="3 3" opacity="0.7"/>
    <!-- Handles -->
    <line x1="45" y1="46" x2="45" y2="54" stroke-width="2.4"/>
    <line x1="55" y1="46" x2="55" y2="54" stroke-width="2.4"/>
  </g>
</svg>